name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Tous les jours à 03:30 UTC (05:30 Paris l'été) : les caisses des cinémas
    # poussent leur programmation la veille, on régénère le site chaque matin.
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Récupérer les séances (API SCARE)
        run: python scripts/fetch_data.py
      - name: Générer le site
        run: python scripts/build_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
